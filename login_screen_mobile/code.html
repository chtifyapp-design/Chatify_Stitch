<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Chatify - Secure Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed": "#ebddff",
              "primary": "#4cd6fb",
              "on-background": "#dee2f5",
              "inverse-surface": "#dee2f5",
              "surface-tint": "#4cd6fb",
              "on-primary-fixed": "#001f27",
              "surface-container-highest": "#303443",
              "surface-bright": "#343948",
              "background": "#0e1320",
              "on-primary-container": "#00414f",
              "tertiary-fixed-dim": "#d3bbff",
              "surface-dim": "#0e1320",
              "tertiary-container": "#b692ff",
              "on-error": "#690005",
              "on-surface": "#dee2f5",
              "on-secondary": "#00287c",
              "primary-fixed-dim": "#4cd6fb",
              "on-tertiary-container": "#4c00a8",
              "surface-container-lowest": "#090e1b",
              "secondary-container": "#224095",
              "on-secondary-fixed-variant": "#224095",
              "on-secondary-container": "#9db2ff",
              "on-tertiary-fixed": "#250059",
              "on-secondary-fixed": "#00164e",
              "outline-variant": "#3d494d",
              "outline": "#869398",
              "secondary-fixed": "#dce1ff",
              "error": "#ffb4ab",
              "surface-variant": "#303443",
              "on-surface-variant": "#bcc9ce",
              "on-tertiary-fixed-variant": "#5b00c5",
              "surface-container-high": "#252a38",
              "surface": "#0e1320",
              "primary-container": "#00b4d8",
              "surface-container": "#1a1f2d",
              "on-error-container": "#ffdad6",
              "on-primary-fixed-variant": "#004e5f",
              "secondary": "#b5c4ff",
              "on-primary": "#003642",
              "secondary-fixed-dim": "#b5c4ff",
              "inverse-primary": "#00677d",
              "primary-fixed": "#b3ebff",
              "on-tertiary": "#3f008d",
              "tertiary": "#d3bbff",
              "surface-container-low": "#161b29",
              "inverse-on-surface": "#2b303e",
              "error-container": "#93000a"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"],
              "mono": ["JetBrains Mono"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
      }
      .neon-glow-primary {
        box-shadow: 0 0 20px rgba(0, 180, 216, 0.25);
      }
      .neon-nebula-bg {
        background: radial-gradient(circle at 20% 30%, rgba(76, 214, 251, 0.15) 0%, transparent 40%),
                    radial-gradient(circle at 80% 70%, rgba(109, 40, 217, 0.15) 0%, transparent 40%),
                    #0e1320;
      }
      .hexagon-mask {
        clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-background min-h-screen flex items-center justify-center neon-nebula-bg overflow-hidden p-6">
<!-- Login Container -->
<div class="w-full max-w-md glass-card rounded-[24px] border border-white/5 p-8 relative overflow-hidden flex flex-col items-center">
<!-- Decorative Glows -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/20 blur-[80px] rounded-full"></div>
<div class="absolute -bottom-24 -left-24 w-48 h-48 bg-tertiary/20 blur-[80px] rounded-full"></div>
<!-- Header / Logo Area -->
<header class="flex flex-col items-center mb-10 w-full">
<div class="w-16 h-16 bg-gradient-to-br from-primary to-primary-container rounded-xl flex items-center justify-center neon-glow-primary mb-4">
<span class="material-symbols-outlined text-on-primary text-4xl" data-icon="forum">forum</span>
</div>
<h1 class="font-headline text-headline-sm font-bold tracking-tighter text-primary">Chatify</h1>
<p class="font-mono text-[10px] uppercase tracking-[0.2em] text-outline mt-1">Interstellar Command</p>
</header>
<!-- User Type Toggle -->
<div class="w-full mb-8">
<div class="bg-surface-container-lowest p-1 rounded-full flex relative border border-white/5">
<button class="flex-1 py-2 text-sm font-medium rounded-full bg-primary-container text-on-primary-container z-10 transition-all">
                    Normal User
                </button>
<button class="flex-1 py-2 text-sm font-medium text-outline z-10 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="verified" style="font-variation-settings: 'FILL' 1;">verified</span>
                    Special Atithi
                </button>
<!-- Selection indicator (visual only) -->
<div class="absolute top-1 left-1 bottom-1 w-[calc(50%-4px)] bg-primary-container rounded-full hidden"></div>
</div>
</div>
<!-- Login Form -->
<form class="w-full space-y-6">
<!-- Username/Email -->
<div class="space-y-2">
<label class="font-mono text-[10px] uppercase tracking-widest text-outline px-1">Access Identity</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="alternate_email">alternate_email</span>
</div>
<input class="w-full bg-white/5 border border-white/10 rounded-xl py-3.5 pl-12 pr-4 text-on-surface focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all placeholder:text-outline/40" placeholder="Username or Email" type="text"/>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-mono text-[10px] uppercase tracking-widest text-outline">Encryption Key</label>
<a class="text-[11px] text-primary/70 hover:text-primary transition-colors" href="#">Recovery Required?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</div>
<input class="w-full bg-white/5 border border-white/10 rounded-xl py-3.5 pl-12 pr-12 text-on-surface focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all placeholder:text-outline/40" placeholder="••••••••••••" type="password"/>
<button class="absolute inset-y-0 right-4 flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-gradient-to-r from-secondary-container to-primary-container py-4 rounded-xl font-headline font-bold text-on-primary-container tracking-tight text-lg shadow-[0_8px_24px_rgba(0,180,216,0.3)] hover:shadow-[0_12px_32px_rgba(0,180,216,0.4)] active:scale-[0.98] transition-all flex items-center justify-center gap-3" type="submit">
                Establish Link
                <span class="material-symbols-outlined" data-icon="rocket_launch">rocket_launch</span>
</button>
</form>
<!-- Footer Info -->
<footer class="mt-10 text-center">
<p class="text-sm text-outline">New operative? 
                <a class="text-primary font-semibold hover:underline decoration-primary/30 underline-offset-4" href="#">Request Credentials</a>
</p>
<!-- Secondary Data Display -->
<div class="mt-8 flex items-center justify-center gap-6 opacity-40">
<div class="flex flex-col items-center">
<span class="font-mono text-[10px]">UPTIME</span>
<span class="font-mono text-[12px] text-primary">99.98%</span>
</div>
<div class="h-6 w-px bg-white/10"></div>
<div class="flex flex-col items-center">
<span class="font-mono text-[10px]">ENCRYPTION</span>
<span class="font-mono text-[12px] text-primary">AES-256</span>
</div>
</div>
</footer>
<!-- Bottom Border Accent -->
<div class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/50 to-transparent"></div>
</div>
<!-- Status Bar Simulation for Mobile Context -->
<div class="fixed top-0 left-0 w-full h-12 flex justify-between items-center px-6 pointer-events-none opacity-60">
<span class="font-mono text-[11px]">21:04</span>
<div class="flex gap-2">
<span class="material-symbols-outlined text-[14px]" data-icon="signal_cellular_4_bar">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[14px]" data-icon="wifi">wifi</span>
<span class="material-symbols-outlined text-[14px]" data-icon="battery_full">battery_full</span>
</div>
</div>
</body></html>
