<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Chatify Snap Screen</title>

              "primary-fixed": "#b3ebff",

              "surface-container": "#1a1f2d",
              "primary-container": "#00b4d8",
              "on-surface-variant": "#bcc9ce",

              "on-tertiary-fixed-variant": "#5b00c5",
              "on-tertiary": "#3f008d",

              "tertiary-container": "#b692ff",
              "on-tertiary-container": "#4c00a8",
              "error": "#ffb4ab",

              "inverse-on-surface": "#2b303e",

              "on-secondary": "#00287c",
              "on-primary-container": "#00414f",
              "tertiary-fixed-dim": "#d3bbff",
              "secondary": "#b5c4ff",
              "inverse-surface": "#dee2f5",
              "on-background": "#dee2f5",
              "surface-variant": "#303443",
              "on-surface": "#dee2f5",
              "secondary-fixed": "#dce1ff",
              "error-container": "#93000a",
              "surface-dim": "#0e1320",
              "on-error": "#690005",
              "surface": "#0e1320",

            fontFamily: {

            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},

<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .shutter-glow {
            box-shadow: 0 0 20px rgba(0, 180, 216, 0.4), inset 0 0 12px rgba(0, 180, 216, 0.2);
        }
        .technical-border {
            border: 1px solid rgba(134, 147, 152, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body select-none overflow-hidden h-screen w-screen flex flex-col">
<!-- Camera Viewfinder (Simulated with blurred abstract gradient) -->
<div class="absolute inset-0 z-0 bg-cover bg-center opacity-80" data-alt="Abstract deep blue and cyan fluid gradient wallpaper" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuD9ZqgAHhO4FBCKERAg86n9rObewtWbbItwsIR-6TZxs-AaOIR0ObbOHv7rB9uZwX5IULxw4dG0KgA3Csdc5RI-xC6NDphKuyG9EdQGcw4eF7ACdX1DHttPJ5Gyr_OImT3G2a_u7iQvqkmaIlLNCw5rPwQcOcRk8uJGb8m26aH1PVMEWnKW0rjICZxRueRoeme5KBGsuBKHgFCiRGmnNtc8mRobJTIRjFmCaixvM_YzHWay3GisN_OVEZ818wkQHVF3EfFpH21yznw');">
<div class="absolute inset-0 backdrop-blur-md bg-background/20"></div>
</div>
<!-- Top AppBar (JSON Derived Mapping) -->
<header class="relative z-10 flex items-center justify-between w-full px-6 py-6 h-20">
<div class="flex items-center gap-4">
<button class="w-12 h-12 flex items-center justify-center rounded-xl glass-panel technical-border text-on-surface active:scale-95 transition-transform">
<span class="material-symbols-outlined text-2xl" data-icon="close">close</span>
</button>
</div>
<div class="flex items-center gap-3">
<button class="w-12 h-12 flex items-center justify-center rounded-xl glass-panel technical-border text-on-surface active:scale-95 transition-transform">
<span class="material-symbols-outlined text-2xl" data-icon="flash_on">flash_on</span>
</button>
<button class="w-12 h-12 flex items-center justify-center rounded-xl glass-panel technical-border text-on-surface active:scale-95 transition-transform">
<span class="material-symbols-outlined text-2xl" data-icon="flip_camera_ios">flip_camera_ios</span>
</button>
</div>
<!-- Style Separation Logic from JSON (Gradient line at bottom of header) -->
<div class="bg-gradient-to-r from-transparent via-[#00B4D8]/10 to-transparent h-[1px] w-full absolute bottom-0 left-0"></div>
</header>
<!-- Main Viewport Overlay -->
<main class="flex-grow relative z-10 flex flex-col items-center justify-center">
<!-- Target Reticle -->
<div class="w-64 h-64 border border-primary/20 rounded-3xl relative">
<div class="absolute -top-2 -left-2 w-6 h-6 border-t-2 border-l-2 border-primary"></div>
<div class="absolute -top-2 -right-2 w-6 h-6 border-t-2 border-r-2 border-primary"></div>
<div class="absolute -bottom-2 -left-2 w-6 h-6 border-b-2 border-l-2 border-primary"></div>
<div class="absolute -bottom-2 -right-2 w-6 h-6 border-b-2 border-r-2 border-primary"></div>
<div class="absolute inset-0 flex items-center justify-center opacity-30">
<div class="w-1 h-10 bg-primary/40 rounded-full"></div>
<div class="h-1 w-10 bg-primary/40 rounded-full absolute"></div>
</div>
</div>
<div class="mt-8 px-4 py-1 rounded-lg glass-panel technical-border">
<span class="font-mono text-[10px] uppercase tracking-[0.2em] text-primary/80">Lens_Status: Ready</span>
</div>
</main>
<!-- Bottom Controls Area -->
<section class="relative z-20 px-6 pb-12 pt-8 glass-panel rounded-t-[32px] border-t border-white/5 shadow-[0_-8px_32px_rgba(0,0,0,0.4)]">
<!-- Timer Selector -->
<div class="flex justify-center mb-10 overflow-hidden">
<div class="flex items-center gap-8 px-8 py-2 rounded-full glass-panel technical-border">
<button class="font-mono text-sm font-medium opacity-40 hover:opacity-100 transition-opacity">OFF</button>
<button class="font-mono text-sm font-medium opacity-40 hover:opacity-100 transition-opacity">3S</button>
<button class="font-mono text-sm font-bold text-primary drop-shadow-[0_0_8px_rgba(0,180,216,0.5)] scale-110">5S</button>
<button class="font-mono text-sm font-medium opacity-40 hover:opacity-100 transition-opacity">10S</button>
</div>
</div>
<!-- Action Row -->
<div class="flex items-center justify-between w-full">
<!-- Gallery Preview -->
<div class="w-14 h-14 rounded-xl technical-border overflow-hidden p-0.5 bg-surface-container">
<img class="w-full h-full object-cover rounded-[10px]" data-alt="Small preview of recent abstract photography in gallery" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAtSxqK_cUQ877js1ZnsMFJtXvPfLP7uvZnKuOas4g0_QUqVfT1f2-1noKbEK-s7AzT6lcm9hK9uA7IS9BG_8Km1o3AWViD3_hRYdmHAaZZt1TYejdMTFR7daQViUwquP9srB1wANH8HNcg3OuZyK9cJNSeGfSGku_8J2B9E6Fdo4iDsHkP70rngucCeJ7zQjvwkj2fZlYtQW4EULei2QmlqqPJzfJzoiF3IJD9PsadbVKr4tSGAg0WYVS0aIeaIcMFQYjSEJSNLGs"/>
</div>
<!-- Capture Button -->
<div class="relative flex items-center justify-center">
<!-- Inner technical ring -->
<div class="absolute w-24 h-24 rounded-full border border-primary/20 animate-pulse"></div>
<!-- Shutter -->
<button class="w-20 h-20 rounded-full bg-white flex items-center justify-center shutter-glow active:scale-90 transition-all duration-150">
<div class="w-16 h-16 rounded-full border-4 border-background/10"></div>
</button>
</div>
<!-- Send to Friends (Contextual Action) -->
<button class="bg-gradient-to-tr from-secondary-container to-primary-container text-on-primary-container px-5 py-4 rounded-2xl flex items-center justify-center shadow-[0_4px_20px_rgba(0,180,216,0.3)] active:scale-95 transition-transform">
<span class="material-symbols-outlined font-bold" data-icon="send" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
<!-- Bottom Labeling (Technical context) -->
<div class="mt-8 flex justify-center">
<div class="flex items-center gap-2">
<span class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></span>
<span class="font-mono text-[9px] uppercase tracking-widest text-slate-500">Secure Vault Transmission Active</span>
</div>
</div>
</section>
<!-- Navigation Shell (JSON Mapping: BottomNavBar) -->
<!-- Suppressed based on "Task-Focused" rule: Camera is a temporary focused journey -->
<!-- However, providing a minimal breadcrumb navigation to return if needed -->
<div class="fixed bottom-2 left-1/2 -translate-x-1/2 z-30">
<div class="h-1 w-12 bg-white/20 rounded-full"></div>
</div>
</body></html>
