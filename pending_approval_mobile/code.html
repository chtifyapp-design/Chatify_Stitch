<body class="font-body antialiased flex flex-col min-h-screen items-center justify-center p-6 overflow-hidden">
<!-- Top Navigation Suppression (Transactional Page) -->
<!-- Background Atmospheric Glows -->
<div class="fixed top-[-10%] left-[-10%] w-[50%] h-[40%] bg-primary-container/10 blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed bottom-[-5%] right-[-5%] w-[40%] h-[30%] bg-tertiary-container/10 blur-[100px] rounded-full pointer-events-none"></div>

<div class="flex flex-col items-center gap-2 mb-8">
<div class="hexagon-mask w-16 h-16 bg-gradient-to-br from-tertiary to-primary-container flex items-center justify-center p-[2px]">

</div>
</div>

</div>
<!-- Hero Illustration Area -->

<div class="absolute inset-0 border border-primary/10 rounded-full animate-pulse"></div>
<div class="absolute inset-8 border border-primary/5 rounded-full"></div>
<!-- Main Illustration Module -->
<div class="relative glass-panel rounded-full w-48 h-48 flex items-center justify-center glow-cyan border border-white/5">
<div class="relative flex items-center justify-center">
<!-- Envelope Icon -->
<span class="material-symbols-outlined text-primary text-7xl opacity-90">mail</span>
<!-- Lock Overlay -->
<div class="absolute bottom-0 right-0 bg-background border border-primary/30 rounded-full p-2 translate-x-2 translate-y-2 shadow-lg">
<span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
</div>
</div>
<!-- Floating Tech Accents -->
<div class="absolute top-10 right-4 font-mono text-[10px] text-primary/40 bg-primary/5 px-2 py-1 rounded border border-primary/10">PENDING_ID: 8821</div>
<div class="absolute bottom-12 left-4 font-mono text-[10px] text-tertiary/40 bg-tertiary/5 px-2 py-1 rounded border border-tertiary/10">TYPE: VIP_ENCRYPT</div>
</div>
<!-- Messaging Content -->
<div class="flex flex-col items-center text-center px-4 mt-8">
<h1 class="font-headline text-4xl font-bold tracking-tight text-on-surface mb-6">
                Request Submitted
            </h1>
<p class="font-body text-on-surface-variant leading-relaxed text-sm max-w-[280px]">
                You'll receive a welcome email once <span class="text-primary font-medium">Admin</span> approves your account.
            </p>
</div>
<!-- Action Area -->
<div class="w-full flex flex-col items-center gap-6 mt-auto">
<!-- Timeline Indicator (Visual only) -->
<div class="flex items-center gap-3 w-full px-12 opacity-50">
<div class="h-[2px] flex-1 bg-primary"></div>
<div class="h-[6px] w-[6px] rounded-full bg-primary ring-4 ring-primary/20"></div>
<div class="h-[2px] flex-1 bg-outline-variant"></div>
</div>
<!-- Back Button -->
<button class="flex items-center gap-2 px-8 py-3 rounded-xl border border-outline-variant hover:bg-white/5 active:scale-95 transition-all group">
<span class="material-symbols-outlined text-on-surface-variant text-xl group-hover:text-primary transition-colors">arrow_back</span>
<span class="font-label text-on-surface-variant font-medium group-hover:text-on-surface transition-colors">Back to Login</span>
</button>
<!-- Footer Technical Data -->
<div class="font-mono text-[9px] uppercase tracking-widest text-outline-variant flex items-center gap-4">
<span>SECURE_HANDSHAKE_ACTIVE</span>
<span class="w-1 h-1 rounded-full bg-primary animate-pulse"></span>
<span>V2.4.0</span>
</div>
</div>
