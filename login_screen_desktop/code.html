<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Chatify | Galactic Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-surface-variant": "#bcc9ce",
              "on-tertiary-container": "#4c00a8",
              "on-tertiary": "#3f008d",
              "surface-container-highest": "#303443",
              "on-secondary-fixed-variant": "#224095",
              "surface-dim": "#0e1320",
              "error": "#ffb4ab",
              "error-container": "#93000a",
              "outline": "#869398",
              "tertiary": "#d3bbff",
              "on-surface": "#dee2f5",
              "surface-container-high": "#252a38",
              "on-background": "#dee2f5",
              "on-tertiary-fixed-variant": "#5b00c5",
              "secondary-fixed-dim": "#b5c4ff",
              "on-secondary": "#00287c",
              "surface-container": "#1a1f2d",
              "on-secondary-fixed": "#00164e",
              "on-primary-container": "#00414f",
              "primary": "#4cd6fb",
              "tertiary-fixed-dim": "#d3bbff",
              "surface-bright": "#343948",
              "background": "#0e1320",
              "on-primary": "#003642",
              "surface-container-low": "#161b29",
              "surface-container-lowest": "#090e1b",
              "tertiary-fixed": "#ebddff",
              "on-error": "#690005",
              "primary-container": "#00b4d8",
              "surface-tint": "#4cd6fb",
              "on-primary-fixed": "#001f27",
              "on-secondary-container": "#9db2ff",
              "on-tertiary-fixed": "#250059",
              "secondary-fixed": "#dce1ff",
              "surface-variant": "#303443",
              "surface": "#0e1320",
              "inverse-surface": "#dee2f5",
              "primary-fixed-dim": "#4cd6fb",
              "on-primary-fixed-variant": "#004e5f",
              "inverse-primary": "#00677d",
              "inverse-on-surface": "#2b303e",
              "tertiary-container": "#b692ff",
              "on-error-container": "#ffdad6",
              "outline-variant": "#3d494d",
              "secondary-container": "#224095",
              "secondary": "#b5c4ff",
              "primary-fixed": "#b3ebff"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"],
              "mono": ["JetBrains Mono"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            background-color: #080D1A;
            font-family: 'Inter', sans-serif;
        }
        .hexagon-mask {
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
        }
        .glass-card {
            backdrop-filter: blur(24px);
            background: rgba(255, 255, 255, 0.03);
        }
        .atithi-glow {
            box-shadow: 0 0 20px rgba(109, 40, 217, 0.4), 0 0 40px rgba(0, 180, 216, 0.2);
        }
        .primary-glow {
            box-shadow: 0 0 16px rgba(0, 180, 216, 0.3);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6 overflow-hidden">
<!-- Ambient Background Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-tertiary/10 rounded-full blur-[120px]"></div>
<div class="w-full max-w-[480px] flex flex-col items-center relative z-10">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-10 group">
<div class="w-16 h-16 bg-gradient-to-br from-secondary-container to-primary-container hexagon-mask flex items-center justify-center mb-4 transition-transform duration-500 group-hover:scale-110">
<span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">rocket_launch</span>
</div>
<h1 class="font-headline font-bold text-4xl tracking-tight bg-gradient-to-r from-secondary-container to-primary-container bg-clip-text text-transparent">
                CHATIFY
            </h1>
<p class="font-mono text-[10px] text-on-surface-variant mt-2 tracking-[0.2em] uppercase">Interstellar Communications</p>
</div>
<!-- Login Card -->
<div class="glass-card w-full p-8 rounded-[2rem] border border-white/10 relative overflow-hidden transition-all duration-500 hover:border-white/20">
<!-- Contextual State: The Special Atithi State Border Glow -->
<div class="absolute inset-0 border-2 border-transparent rounded-[2rem] pointer-events-none opacity-20 bg-gradient-to-br from-[#6D28D9] to-[#00B4D8] [mask-image:linear-gradient(white,white)] [-webkit-mask-image:linear-gradient(white,white)] [mask-clip:content-box] [-webkit-mask-clip:content-box] [mask-composite:exclude] [-webkit-mask-composite:xor]"></div>
<!-- Tab Switcher -->
<div class="flex p-1 bg-surface-container-lowest/50 rounded-xl mb-8 border border-white/5">
<button class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-lg text-sm font-medium transition-all bg-white/10 text-white">
                    Normal User
                </button>
<button class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-lg text-sm font-medium transition-all text-on-surface-variant hover:text-white group">
<span class="material-symbols-outlined text-[18px] group-hover:text-tertiary transition-colors" data-icon="crown">crown</span>
                    Special Atithi
                </button>
</div>
<form class="space-y-6" onsubmit="return false;">
<!-- Identity Field -->
<div class="space-y-2">
<label class="font-label text-xs font-semibold text-on-surface-variant ml-1 uppercase tracking-wider">Email or Username</label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="alternate_email">alternate_email</span>
<input class="w-full bg-surface-container-lowest/40 border border-outline-variant/30 rounded-xl py-3.5 pl-12 pr-4 text-white placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all font-body" placeholder="commander@chatify.space" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider">Password</label>
<a class="font-mono text-[10px] text-primary hover:text-white transition-colors uppercase tracking-tight" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-lowest/40 border border-outline-variant/30 rounded-xl py-3.5 pl-12 pr-12 text-white placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all font-body" placeholder="••••••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline hover:text-white transition-colors" data-icon="visibility" type="button">visibility</button>
</div>
</div>
<!-- Remember Me / System Status (Editorial spacing) -->
<div class="flex items-center gap-3 py-2">
<input class="w-4 h-4 rounded border-outline-variant/30 bg-surface-container-lowest text-primary focus:ring-primary/20 focus:ring-offset-0" id="remember" type="checkbox"/>
<label class="font-body text-sm text-on-surface-variant cursor-pointer select-none" for="remember">Maintain secure link</label>
</div>
<!-- CTA Button -->
<button class="w-full bg-gradient-to-r from-secondary-container to-primary-container text-white font-headline font-bold py-4 rounded-xl primary-glow hover:scale-[1.02] active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 group" type="submit">
<span>Login</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Bottom Link -->
<div class="mt-8 pt-8 border-t border-white/5 text-center">
<p class="font-body text-sm text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-primary font-semibold hover:underline decoration-primary/30 underline-offset-4 ml-1" href="#">Sign Up</a>
</p>
</div>
</div>
<!-- System Meta Info -->
<div class="mt-8 flex items-center gap-6 opacity-40 font-mono text-[10px] uppercase tracking-widest text-on-surface-variant">
<div class="flex items-center gap-2">
<span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                Nodes Active
            </div>
<div class="w-1 h-1 rounded-full bg-outline-variant"></div>
<div>Build v4.0.2-ALPHA</div>
<div class="w-1 h-1 rounded-full bg-outline-variant"></div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[12px]" data-icon="encrypted">encrypted</span>
                AES-256
            </div>
</div>
</div>
<!-- Decorative Corner Elements -->
<div class="fixed top-8 left-8 flex flex-col gap-1 opacity-20 pointer-events-none">
<div class="w-8 h-[1px] bg-white"></div>
<div class="w-[1px] h-8 bg-white"></div>
</div>
<div class="fixed bottom-8 right-8 flex flex-col gap-1 items-end opacity-20 pointer-events-none">
<div class="w-[1px] h-8 bg-white"></div>
<div class="w-8 h-[1px] bg-white"></div>
</div>
</body></html>
