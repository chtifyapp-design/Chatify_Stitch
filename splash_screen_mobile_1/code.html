<!DOCTYPE html>

<style>
        .hexagon-mask {
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }
        .glow-pulse {
            box-shadow: 0 0 40px rgba(0, 180, 216, 0.4);
        }
        .bg-void {
            background-color: #080D1A;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-void text-on-background font-body h-screen w-full flex flex-col items-center justify-between overflow-hidden">
<!-- Supress TopAppBar and BottomNavBar as per "The Destination Rule": This is a focused splash screen -->
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center w-full px-8 relative">
<!-- Background Ambient Glows (Atmospheric Depth) -->
<div class="absolute top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-1/4 right-0 w-[200px] h-[200px] bg-tertiary/5 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Central Logo Module -->
<div class="relative flex flex-col items-center gap-12">
<!-- Animated Hexagon Logo Container -->
<div class="relative group">
<!-- Outer Glow Ring -->
<div class="absolute -inset-4 bg-primary/20 blur-2xl rounded-full scale-110"></div>
<!-- The Hexagon Command Center -->
<div class="w-[120px] h-[120px] bg-gradient-to-br from-primary-container to-secondary-container hexagon-mask flex items-center justify-center glow-pulse relative z-10">
<div class="w-[114px] h-[114px] bg-surface-container-lowest hexagon-mask flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1;">
                            rocket_launch
                        </span>
</div>
</div>
<!-- Decorative Orbitals -->
<div class="absolute -top-2 -right-2 w-4 h-4 bg-tertiary rounded-full border-4 border-void"></div>
</div>
<!-- Brand Identity -->
<div class="flex flex-col items-center gap-3">
<h1 class="font-headline text-5xl tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-primary to-primary-container">
                    CHATIFY
                </h1>
<p class="italic text-on-surface-variant/60 font-body text-sm tracking-wide">
                    Private. Encrypted. Yours.
                </p>
</div>
</div>
</main>
<!-- Loading System Terminal -->
<footer class="w-full px-12 pb-16 flex flex-col items-center gap-6">
<!-- The Data Stream (Loading Indicator) -->
<div class="relative w-full max-w-[240px] h-[2px] bg-surface-container-highest rounded-full overflow-hidden">
<div class="absolute top-0 left-0 h-full w-1/3 bg-gradient-to-r from-transparent via-primary to-transparent animate-[shimmer_2s_infinite]"></div>
<!-- Mock animation via tailwind classes would go here, using a static representation -->
<div class="h-full bg-primary w-2/3 rounded-full shadow-[0_0_12px_rgba(76,214,251,0.6)]"></div>
</div>
<!-- System Metadata -->
<div class="flex flex-col items-center gap-1">
<span class="font-mono text-[10px] uppercase tracking-[0.2em] text-on-surface-variant/40">
                Initializing_Secure_Protocols
            </span>
<span class="font-mono text-[10px] text-primary/40">
                v4.0.2-OMEGA
            </span>
</div>
</footer>
<!-- Decorative Corner Gradients (Spatial Future Feel) -->
<div class="fixed top-0 left-0 w-32 h-32 bg-gradient-to-br from-primary/5 to-transparent pointer-events-none"></div>
<div class="fixed bottom-0 right-0 w-32 h-32 bg-gradient-to-tl from-tertiary/5 to-transparent pointer-events-none"></div>

<div class="hidden">
<span data-icon="rocket_launch" data-weight="fill">rocket_launch</span>
</div>
