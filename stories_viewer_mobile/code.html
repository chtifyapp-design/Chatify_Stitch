<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hexagon-mask {
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
        }
        .progress-segment {
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            flex-grow: 1;
            margin: 0 2px;
            border-radius: 1px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #4cd6fb;
            width: 0%;
        }
        .active-progress {
            width: 65%;
        }
        .complete-progress {
            width: 100%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background font-body text-on-background overflow-hidden antialiased">
<!-- Immersive Story Canvas -->
<div class="relative h-screen w-full max-w-md mx-auto overflow-hidden shadow-2xl">

<div class="absolute inset-0 bg-gradient-to-b from-black/60 via-transparent to-black/80"></div>
</div>
<!-- UI Overlays -->
<div class="absolute inset-0 flex flex-col pointer-events-none">
<!-- Progress Bars (Top) -->
<div class="px-4 pt-4 pb-2 flex gap-1 z-20">
<div class="progress-segment"><div class="progress-fill complete-progress"></div></div>
<div class="progress-segment"><div class="progress-fill complete-progress"></div></div>
<div class="progress-segment"><div class="progress-fill active-progress"></div></div>
<div class="progress-segment"><div class="progress-fill"></div></div>
</div>
<!-- Top Header Overlay -->
<div class="flex items-center justify-between px-4 py-3 z-20 pointer-events-auto">
<div class="flex items-center gap-3">
<!-- Atithi Hexagon Avatar -->
<div class="relative w-10 h-10 flex items-center justify-center">
<div class="absolute inset-0 bg-gradient-to-br from-tertiary to-primary-container hexagon-mask p-[2px]">
<div class="w-full h-full bg-surface-dim hexagon-mask flex items-center justify-center overflow-hidden">
<img alt="Commander Zephyr" class="w-full h-full object-cover" data-alt="Portrait of a futuristic user" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDKKcwM2ihlqv8sL53vErteFVekxHKHlnD0bMQrffguxwxCbYTAklOdgM0pk0jupN9r-5WjOiEG9JMLQkRRwUrGo5jcHNpyPSpO7KtEPHl8BoWDByOfVPaKhOIWkEv1N-Eu9NaFhy1oE8qFtrHXIm6lJ3EVOdqggWr0JmeDYLlGYkhri9goxdlj8jdY5wVRdxv0tv8tGOv39dqKHB9PC8OgFGtTfIQOAqhh0UpUthyPcx8-gCpZSsCWm8E_n5Hgnu5cvFd7a7IDn6U"/>
</div>
</div>
</div>
<div>

<p class="font-mono text-[10px] text-primary uppercase tracking-tighter">Sector 7-G • 4h ago</p>
</div>
</div>
<div class="flex gap-4">
<button class="active:scale-95 duration-200"><span class="material-symbols-outlined text-on-surface">more_horiz</span></button>
<button class="active:scale-95 duration-200"><span class="material-symbols-outlined text-on-surface">close</span></button>
</div>
</div>
<!-- Main Content Area (Spacers) -->
<div class="flex-grow"></div>
<!-- Bottom Section -->
<div class="p-6 z-20 pointer-events-auto">

<div class="flex flex-col items-center mb-8 opacity-40">
<span class="material-symbols-outlined animate-bounce">keyboard_double_arrow_up</span>
<p class="font-mono text-[10px] uppercase tracking-widest mt-1">Initiate Link</p>
</div>
<!-- Footer Interaction -->
<div class="flex items-center justify-between gap-4">
<div class="flex-grow glass-panel rounded-xl px-4 py-3 border border-white/10">
<input class="bg-transparent border-none text-on-surface placeholder-white/40 focus:ring-0 w-full text-sm" placeholder="Transmit message..." type="text"/>
</div>
<div class="flex gap-4 items-center">
<button class="flex flex-col items-center gap-1 active:scale-90 duration-150">
<span class="material-symbols-outlined text-on-surface" style="font-variation-settings: 'FILL' 1;">favorite</span>
</button>
<button class="flex flex-col items-center gap-1 active:scale-90 duration-150">
<span class="material-symbols-outlined text-on-surface">send</span>
</button>
</div>
</div>
<!-- Viewers Count -->
<div class="mt-6 flex items-center justify-center gap-2">
<div class="glass-panel px-3 py-1 rounded-full flex items-center gap-2 border border-white/5">
<span class="material-symbols-outlined text-primary text-sm">visibility</span>
<span class="font-mono text-[10px] text-on-surface/80">1,204 OBSERVERS</span>
</div>
</div>
</div>
</div>
<!-- Gesture Areas (Left/Right) -->
<div class="absolute inset-y-0 left-0 w-1/4 z-10 active:bg-white/5 transition-colors"></div>
<div class="absolute inset-y-0 right-0 w-1/4 z-10 active:bg-white/5 transition-colors"></div>
</div>
<!-- Hidden Sidebar (Simulating Desktop Presence/Structure if viewed on wide) -->
<div class="hidden md:flex fixed left-0 top-0 h-full w-64 bg-surface-container-low border-r border-white/5 flex-col p-6">
<div class="text-[#00B4D8] font-headline text-2xl font-bold tracking-tighter mb-10">Chatify</div>
<nav class="space-y-6">
<div class="flex items-center gap-4 text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">movie</span>
<span class="font-mono text-xs uppercase tracking-widest">Cinema</span>
</div>
<div class="flex items-center gap-4 text-slate-500 hover:text-primary transition-colors cursor-pointer">
<span class="material-symbols-outlined">forum</span>
<span class="font-mono text-xs uppercase tracking-widest">Chat</span>
</div>
<div class="flex items-center gap-4 text-slate-500 hover:text-primary transition-colors cursor-pointer">
<span class="material-symbols-outlined">lock_open</span>
<span class="font-mono text-xs uppercase tracking-widest">Vault</span>
</div>
<div class="flex items-center gap-4 text-slate-500 hover:text-primary transition-colors cursor-pointer">
<span class="material-symbols-outlined">verified</span>
<span class="font-mono text-xs uppercase tracking-widest">Atithi</span>
</div>
</nav>
