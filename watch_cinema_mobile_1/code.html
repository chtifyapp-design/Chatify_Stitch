<span class="font-mono text-[10px] uppercase tracking-widest text-primary">Live Sync: 4 Members</span>
</div>
</div>
<div class="bg-gradient-to-r from-transparent via-[#00B4D8]/10 to-transparent h-[1px] w-full absolute bottom-0"></div>

</div>

<span class="material-symbols-outlined text-primary text-sm">sync</span>
<p class="font-mono text-[10px] text-on-surface">Alex adjusted playhead to 42:15</p>
</div>
</div>
<!-- Player Controls (Bottom of Video Area) -->
<div class="absolute bottom-0 left-0 w-full p-4 flex flex-col gap-3 bg-gradient-to-t from-surface-container-lowest to-transparent">

<div class="w-full h-1 bg-white/10 rounded-full relative overflow-hidden group/progress">
<div class="absolute left-0 top-0 h-full w-[45%] bg-gradient-to-r from-primary to-primary-container photonic-glow"></div>

</button>
<button class="text-white hover:text-primary transition-colors active:scale-90">
<span class="material-symbols-outlined">forward_10</span>
</button>
<span class="font-mono text-xs text-on-surface-variant">42:15 / 1:56:00</span>
</div>
<div class="flex items-center gap-4">
<button class="text-white hover:text-primary transition-colors">
<span class="material-symbols-outlined">volume_up</span>
</button>
<button class="text-white hover:text-primary transition-colors">
<span class="material-symbols-outlined">settings</span>
</button>
<button class="text-white hover:text-primary transition-colors">
<span class="material-symbols-outlined">fullscreen</span>
</button>
</div>
</div>
</div>
</section>

<button class="flex-shrink-0 px-4 py-2 glass rounded-xl border border-white/5 flex items-center gap-2 opacity-60">

<button class="flex-shrink-0 px-4 py-2 glass rounded-xl border border-white/5 flex items-center gap-2 opacity-60">
<span class="material-symbols-outlined text-sm">cloud</span>
<span class="text-xs font-semibold">IPFS_Stream</span>
</button>
</div>

</div>
<div>
<p class="text-[10px] text-on-surface-variant font-mono">Jordan:</p>

</div>
<span class="material-symbols-outlined text-on-surface-variant">keyboard_arrow_up</span>
</div>

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">movie</span>
<span class="font-['JetBrains_Mono'] text-[10px] uppercase tracking-widest mt-1">Cinema</span>

<a class="flex flex-col items-center justify-center text-slate-500 opacity-60 hover:text-[#00B4D8] transition-all active:scale-90 duration-150" href="#">

<span class="font-['JetBrains_Mono'] text-[10px] uppercase tracking-widest mt-1">Atithi</span>
